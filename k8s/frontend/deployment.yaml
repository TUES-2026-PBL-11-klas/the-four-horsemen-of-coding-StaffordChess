apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-ui
  namespace: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: web-ui
        image: "vikt0rinho/frontend:8bb57cf1541fa0c6272e0414426c68df293a8961"
        ports:
        - containerPort: 80
        env:
        - name: VITE_API_BASE_URL
          value: "http://localhost/api"