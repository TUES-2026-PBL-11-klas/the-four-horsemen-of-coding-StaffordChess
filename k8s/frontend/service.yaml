apiVersion: v1
kind: Service
metadata:
  name: stafford-chess-frontend-service
  namespace: frontend
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
    service.beta.kubernetes.io/aws-load-balancer-connection-idle-timeout: "3600"
spec:
  type: LoadBalancer
  selector:
    app: stafford-chess-frontend
  ports:
  - name: http
    port: 80
    targetPort: 80
    protocol: TCP
 