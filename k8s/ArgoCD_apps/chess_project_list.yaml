apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: stafford-chess
  namespace: argocd
spec:
  description: StaffordChess - Chess web application project

  sourceRepos:
    - https://github.com/TUES-2026-PBL-11-klas/the-four-horsemen-of-coding-StaffordChess.git

  destinations:
    - server: https://kubernetes.default.svc
      namespace: backend
    - server: https://kubernetes.default.svc
      namespace: frontend
    - server: https://kubernetes.default.svc
      namespace: database
    - server: https://kubernetes.default.svc
      namespace: observability

  clusterResourceWhitelist:
    - group: ""
      kind: Namespace
    - group: "rbac.authorization.k8s.io"
      kind: ClusterRole
    - group: "rbac.authorization.k8s.io"
      kind: ClusterRoleBinding

  namespaceResourceWhitelist:
    - group: "apps"
      kind: Deployment
    - group: "apps"
      kind: StatefulSet
    - group: ""
      kind: Service
    - group: ""
      kind: ConfigMap
    - group: ""
      kind: Secret
    - group: ""
      kind: PersistentVolumeClaim
    - group: "networking.k8s.io"
      kind: Ingress
    - group: "batch"
      kind: Job
    - group: "monitoring.coreos.com"
      kind: ServiceMonitor
    - group: "monitoring.coreos.com"
      kind: PrometheusRule
    - group: "external-secrets.io"
      kind: SecretStore
    - group: "external-secrets.io"
      kind: ExternalSecret
  orphanedResources:
    warn: true