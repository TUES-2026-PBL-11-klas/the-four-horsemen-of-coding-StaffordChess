apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: stafford-chess-backend
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: stafford-chess
    tier: backend
spec:
  project: stafford-chess
 
  source:
    repoURL: https://github.com/TUES-2026-PBL-11-klas/the-four-horsemen-of-coding-StaffordChess.git
    targetRevision: Infrastructure
    path: k8s/backend
 
  destination:
    server: https://kubernetes.default.svc
    namespace: backend
 
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 1m