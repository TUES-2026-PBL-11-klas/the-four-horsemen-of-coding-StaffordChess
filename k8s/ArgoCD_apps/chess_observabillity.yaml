apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: stafford-chess-observability
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: stafford-chess
    tier: observability
spec:
  project: stafford-chess

  source:
    repoURL: https://github.com/TUES-2026-PBL-11-klas/the-four-horsemen-of-coding-StaffordChess.git
    targetRevision: updates
    path: k8s/observability

  destination:
    server: https://kubernetes.default.svc
    namespace: observability

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - ApplyOutOfSyncOnly=true
    retry:
      limit: 3
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 2m

  ignoreDifferences:
    - group: apps
      kind: Deployment
      name: grafana
      jsonPointers:
        - /spec/template/metadata/annotations
    - group: ""
      kind: Secret
      name: grafana-admin-secret
      jsonPointers:
        - /data