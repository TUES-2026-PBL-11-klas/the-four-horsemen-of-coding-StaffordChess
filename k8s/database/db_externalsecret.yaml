apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: vault-database
  namespace: database
spec:
  provider:
    vault:
      server: "https://stafford-chess-vault-cluster-public-vault-fdac272f.53a2cb0f.z1.hashicorp.cloud:8200"
      path: "secret"
      version: "v2"
      namespace: "admin"
      auth:
        tokenSecretRef:
          name: vault-token
          key: token
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: db-secret
  namespace: database
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-database
    kind: SecretStore
  target:
    name: db-secret
    creationPolicy: Owner
  data:
    - secretKey: POSTGRES_USER
      remoteRef:
        key: staffordchess
        property: POSTGRES_USER
    - secretKey: POSTGRES_PASSWORD
      remoteRef:
        key: staffordchess
        property: POSTGRES_PASSWORD
    - secretKey: POSTGRES_DB
      remoteRef:
        key: staffordchess
        property: POSTGRES_DB