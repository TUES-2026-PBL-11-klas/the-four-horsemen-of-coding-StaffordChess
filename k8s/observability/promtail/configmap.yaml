# promtail/configmap.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: promtail-config
  namespace: observability
data:
  promtail.yaml: |
    server:
      http_listen_port: 9080
      grpc_listen_port: 0

    positions:
      filename: /tmp/positions.yaml

    clients:
      - url: http://loki:3100/loki/api/v1/push

    scrape_configs:
      - job_name: kubernetes-pods
        kubernetes_sd_configs:
          - role: pod
        pipeline_stages:
          # Parse Python logging format:
          # "2024-01-01 12:00:00,123 INFO     module:lineno - message"
          - regex:
              expression: '^(?P<timestamp>\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2},\d+)\s+(?P<level>\w+)\s+.*?- (?P<message>.+)$'
          - labels:
              level:
          # Drop noisy health check logs
          - drop:
              expression: ".*(GET /health|GET /metrics).*"
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_node_name]
            target_label: __host__
          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
          - source_labels: [__meta_kubernetes_pod_label_app]
            target_label: app
          - source_labels: [__meta_kubernetes_pod_container_name]
            target_label: container
          # Only tail pods that have opted in, or remove this to tail everything
          - source_labels: [__meta_kubernetes_pod_annotation_promtail_io_collect]
            action: drop
            regex: "false"
          - replacement: /var/log/pods/*$1*/*/*.log
            source_labels: [__meta_kubernetes_pod_uid]
            target_label: __path__