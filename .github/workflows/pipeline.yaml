name: CI/CD Pipeline

on:
  push:
    branches:
      - 'updates'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest  
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest
          
      - name: Run tests
        run: |
          pytest

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Backend Docker image
        run: |
          IMAGE_TAG=${{ github.sha }}
          IMAGE_NAME=vikt0rinho/staffordchess-backend
          docker build -f app/Dockerfile -t $IMAGE_NAME:$IMAGE_TAG ./app
          docker push $IMAGE_NAME:$IMAGE_TAG

      # --- Frontend стъпките са изключени, докато няма frontend/Dockerfile ---
      # - name: Build and push Frontend Docker image
      #   run: |
      #     IMAGE_TAG=${{ github.sha }}
      #     IMAGE_NAME=vikt0rinho/staffordchess-frontend
      #     docker build -f frontend/Dockerfile -t $IMAGE_NAME:$IMAGE_TAG ./frontend
      #     docker push $IMAGE_NAME:$IMAGE_TAG

      - name: Update images' tag in manifests
        run: |
          IMAGE_TAG=${{ github.sha }}
          sed -i -E "s#image: \"[^\"]+\"#image: \"vikt0rinho/staffordchess-backend:$IMAGE_TAG\"#" k8s/backend/deployment.yaml
      #   sed -i -E "s#image: \"[^\"]+\"#image: \"vikt0rinho/staffordchess-frontend:$IMAGE_TAG\"#" k8s/frontend/deployment.yaml

      - name: Commit updated manifests
        run: |
          IMAGE_TAG=${{ github.sha }}
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add k8s/backend/deployment.yaml
          if git diff --cached --quiet; then
            echo "No manifest change to commit"
          else
            git commit -m "ci: update images' tags to $IMAGE_TAG"
            git push
          fi